<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8a2be2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4b0082;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffa8a8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="60" rx="8" fill="url(#bgGradient)"/>
  
  <!-- Robot/circuit icon -->
  <g transform="translate(15, 10)">
    <!-- Circuit pattern -->
    <circle cx="8" cy="8" r="3" fill="url(#logoGradient)"/>
    <line x1="11" y1="8" x2="18" y2="8" stroke="url(#logoGradient)" stroke-width="1.5"/>
    <circle cx="21" cy="8" r="3" fill="url(#logoGradient)"/>
    <line x1="21" y1="11" x2="21" y2="18" stroke="url(#logoGradient)" stroke-width="1.5"/>
    <circle cx="21" cy="21" r="3" fill="url(#logoGradient)"/>
    <line x1="18" y1="21" x2="11" y2="21" stroke="url(#logoGradient)" stroke-width="1.5"/>
    <circle cx="8" cy="21" r="3" fill="url(#logoGradient)"/>
    <line x1="8" y1="18" x2="8" y2="11" stroke="url(#logoGradient)" stroke-width="1.5"/>
  </g>
  
  <!-- Text -->
  <text x="50" y="23" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">Evolver</text>
  <text x="50" y="40" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#ffa8a8">Robotics</text>
</svg>
