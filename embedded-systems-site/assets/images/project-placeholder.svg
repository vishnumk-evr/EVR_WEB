<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="pcbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0d5ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#pcbGradient)"/>
  
  <!-- PCB/Circuit Board visualization -->
  <!-- Main board -->
  <rect x="100" y="80" width="400" height="250" rx="8" fill="#1a4d2e" stroke="#2d6a4f" stroke-width="2"/>
  
  <!-- Copper traces -->
  <line x1="150" y1="120" x2="450" y2="120" stroke="#d4a574" stroke-width="3" opacity="0.8"/>
  <line x1="150" y1="120" x2="150" y2="200" stroke="#d4a574" stroke-width="3" opacity="0.8"/>
  <line x1="450" y1="120" x2="450" y2="280" stroke="#d4a574" stroke-width="3" opacity="0.8"/>
  <line x1="150" y1="200" x2="300" y2="200" stroke="#d4a574" stroke-width="3" opacity="0.8"/>
  <line x1="300" y1="200" x2="300" y2="280" stroke="#d4a574" stroke-width="3" opacity="0.8"/>
  
  <!-- Components (circles) -->
  <circle cx="180" cy="140" r="12" fill="#ff6b9d" opacity="0.9"/>
  <circle cx="250" cy="160" r="10" fill="#ffa8a8" opacity="0.9"/>
  <circle cx="350" cy="150" r="11" fill="#ff6b9d" opacity="0.9"/>
  <circle cx="420" cy="200" r="12" fill="#ffa8a8" opacity="0.9"/>
  <circle cx="300" cy="240" r="10" fill="#ff6b9d" opacity="0.9"/>
  
  <!-- LED indicators -->
  <circle cx="200" cy="250" r="6" fill="#00ff00" opacity="0.8" filter="url(#glow)"/>
  <circle cx="250" cy="270" r="6" fill="#ffff00" opacity="0.8" filter="url(#glow)"/>
  
  <!-- Glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Text label -->
  <text x="50" y="360" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#4b0082">IoT PCB Design</text>
  <text x="50" y="385" font-family="Arial, sans-serif" font-size="12" fill="#666">Real Project Example</text>
</svg>
