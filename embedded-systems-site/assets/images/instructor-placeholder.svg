<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9370db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a2be2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#avatarGrad)"/>
  
  <!-- Head -->
  <circle cx="100" cy="60" r="35" fill="#fdbcb4"/>
  
  <!-- Body -->
  <rect x="75" y="95" width="50" height="65" rx="10" fill="#4a90e2"/>
  
  <!-- Eyes -->
  <circle cx="90" cy="50" r="5" fill="#333"/>
  <circle cx="110" cy="50" r="5" fill="#333"/>
  
  <!-- Smile -->
  <path d="M 90 65 Q 100 72 110 65" stroke="#333" stroke-width="2" fill="none"/>
  
  <!-- Badge/Icon on chest -->
  <circle cx="100" cy="115" r="12" fill="#ffa8a8"/>
  <text x="96" y="120" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">👨‍💼</text>
</svg>
